apiVersion: "vmoperator.jdrupes.org/v1"
kind: VirtualMachine
metadata:
  namespace: vmop-dev
  name: test-vm
spec:
  image:
    # Adapt to your own test registry
    # source: registry.mnl.de/org/jdrupes/vm-operator/org.jdrupes.vmoperator.runner.qemu-arch:testing
    source: docker-registry.lan.mnl.de/vmoperator/org.jdrupes.vmoperator.runner.qemu-alpine:test
    pullPolicy: Always

  permissions:
  - user: admin
    may: 
    - "*"

  resources:
    requests:
      cpu: 1
      memory: 2Gi

  runnerTemplate:
    update: true

  guestShutdownStops: true
  
  cloudInit: {}
  
  vm:
    # state: Running
    bootMenu: yes
    useTpm: true
    maximumRam: 8Gi
    currentRam: 4Gi
    maximumCpus: 4
    currentCpus: 4
  
    networks:
    # No bridge on test cluster
    - user: {}

    disks:
    - volumeClaimTemplate:
        metadata:
          name: system
        spec:
          storageClassName: ""
          selector:
            matchLabels:
              app.kubernetes.io/name: vmrunner
              app.kubernetes.io/instance: test-vm
              vmrunner.jdrupes.org/disk: system
          resources:
            requests:
              storage: 40Gi
    - cdrom:
        image: ""
        # image: "https://download.fedoraproject.org/pub/fedora/linux/releases/44/Workstation/x86_64/iso/Fedora-Workstation-Live-44-1.7.x86_64.iso"
        # image: "Fedora-Workstation-Live-44-1.7.x86_64.iso"

    display:
      spice:
        port: 5810
        generateSecret: true

  loadBalancerService: {}
